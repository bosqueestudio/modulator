 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulator // Kinetic Mosaic Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #0b0b0d; font-family: monospace; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        #canvas-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body class="text-white select-none">

    <div id="canvas-container" class="w-full h-full">
        <canvas id="webgl-canvas"></canvas>
    </div>

    <div class="absolute top-6 left-6 z-10 bg-black/90 backdrop-blur-xl p-5 rounded-xl border border-white/10 w-80 flex flex-col gap-4 text-xs tracking-widest uppercase shadow-2xl max-h-[92vh] overflow-y-auto">
        <div class="flex items-center justify-between border-b border-white/20 pb-3">
            <h1 class="text-sm font-bold tracking-normal text-purple-400">Modulator _v2</h1>
            <span class="text-[9px] bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full border border-purple-500/30">2D Kinetic</span>
        </div>
        
        <div class="flex flex-col gap-1.5">
            <label class="text-gray-400 font-bold text-[10px]">01 / Cargar Imagen</label>
            <input type="file" id="image-loader" accept="image/*" class="bg-white/5 p-2 rounded-lg cursor-pointer border border-white/10 hover:border-purple-500 hover:bg-white/10 transition-all text-[11px]">
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-gray-400 font-bold text-[10px]">02 / Formato Canvas</label>
            <div class="grid grid-cols-3 gap-2 text-center font-bold">
                <button id="ratio-full" class="bg-purple-600 p-2 rounded-lg border border-purple-400/30 cursor-pointer transition-all">Full</button>
                <button id="ratio-169" class="bg-white/5 p-2 rounded-lg border border-white/5 hover:bg-white/10 cursor-pointer transition-all">16:9</button>
                <button id="ratio-45" class="bg-white/5 p-2 rounded-lg border border-white/5 hover:bg-white/10 cursor-pointer transition-all">4:5</button>
            </div>
        </div>

        <div class="flex flex-col gap-2 border-t border-white/10 pt-3">
            <label class="text-gray-400 font-bold text-[10px]">03 / Estructura y Movimiento</label>
            <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/5">
                <span class="text-gray-300 text-[11px]">Bloques: <span id="cols-val" class="font-bold text-purple-400">8</span></span>
                <input type="range" id="param-cols" min="3" max="30" value="8" class="w-28 accent-purple-500 h-1 bg-white/10 rounded-lg appearance-none cursor-pointer">
            </div>
            <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/5">
                <span class="text-gray-300 text-[11px]">Velocidad: <span id="speed-val" class="font-bold text-purple-400">1.0</span></span>
                <input type="range" id="param-speed" min="0" max="4" step="0.1" value="1.0" class="w-28 accent-purple-500 h-1 bg-white/10 rounded-lg appearance-none cursor-pointer">
            </div>
            <button id="btn-regenerate" class="w-full bg-white/10 hover:bg-purple-600 border border-white/10 p-2 rounded-lg font-bold transition-all cursor-pointer text-center text-[10px] tracking-widest mt-1">
                🎲 Regenerate Blocks
            </button>
        </div>

        <div class="flex flex-col gap-2 border-t border-white/10 pt-3">
            <label class="text-gray-400 font-bold text-[10px]">04 / Cromatismo Modo</label>
            <div class="grid grid-cols-3 gap-1.5 text-center font-bold text-[10px] mb-1">
                <button id="mode-none" class="bg-purple-600 p-1.5 rounded cursor-pointer transition-all">Original</button>
                <button id="mode-duo" class="bg-white/5 p-1.5 rounded hover:bg-white/10 cursor-pointer transition-all">Duo</button>
                <button id="mode-tri" class="bg-white/5 p-1.5 rounded hover:bg-white/10 cursor-pointer transition-all">Trito</button>
            </div>
            
            <div id="panel-colors" class="grid grid-cols-3 gap-2 bg-white/5 p-2 rounded-lg border border-white/5 opacity-40 pointer-events-none transition-opacity">
                <div class="flex flex-col items-center gap-1">
                    <span class="text-[8px] text-gray-400">Sombra</span>
                    <input type="color" id="color-shadow" value="#1c1626" class="w-full h-8 rounded cursor-pointer bg-transparent border-0 outline-none">
                </div>
                <div class="flex flex-col items-center gap-1" id="wrapper-mid-color">
                    <span class="text-[8px] text-gray-400">Medio</span>
                    <input type="color" id="color-mid" value="#bebeeb" class="w-full h-8 rounded cursor-pointer bg-transparent border-0 outline-none">
                </div>
                <div class="flex flex-col items-center gap-1">
                    <span class="text-[8px] text-gray-400">Luz</span>
                    <input type="color" id="color-light" value="#ffffff" class="w-full h-8 rounded cursor-pointer bg-transparent border-0 outline-none">
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-2 border-t border-white/10 pt-3 mt-1">
            <button id="btn-snap" class="bg-emerald-600 hover:bg-emerald-500 p-2.5 rounded-lg font-bold transition-colors cursor-pointer text-center tracking-widest shadow-lg">Capturar PNG</button>
            <button id="btn-record" class="bg-red-600 hover:bg-red-500 p-2.5 rounded-lg font-bold transition-colors flex items-center justify-center gap-2 cursor-pointer tracking-widest shadow-lg">
                <span id="record-dot" class="w-2 h-2 bg-white rounded-full hidden animate-pulse"></span>
                <span id="record-text">Grabar WebM (5s)</span>
            </button>
        </div>
    </div>

    <script>
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTexture;
            uniform vec2 uResolution;
            uniform vec2 uImageResolution;
            uniform float uTime;
            uniform float uCols;
            uniform float uSpeed;
            uniform float uSeed;
            uniform int uColorMode; // 0=Original, 1=Duotone, 2=Tritone
            
            uniform vec3 uColorShadow;
            uniform vec3 uColorMid;
            uniform vec3 uColorLight;

            varying vec2 vUv;

            // Funciones matemáticas de ruido estocástico
            float hash2d(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7) + uSeed)) * 43758.5453123);
            }

            void main() {
                // CORRECCIÓN EXACTA DE ASPECT RATIO (Tipo object-fit: cover)
                float screenAspect = uResolution.x / uResolution.y;
                float imageAspect = uImageResolution.x / uImageResolution.y;
                vec2 uvFactor = vec2(1.0);
                
                if (screenAspect > imageAspect) {
                    uvFactor = vec2(1.0, imageAspect / screenAspect);
                } else {
                    uvFactor = vec2(screenAspect / imageAspect, 1.0);
                }
                
                vec2 uv = (vUv - 0.5) * uvFactor + 0.5;

                // Evitar que lea fuera de los bordes limpios de la textura original
                if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
                    gl_FragColor = vec4(0.05, 0.05, 0.07, 1.0);
                    return;
                }

                // ESTRUCTURA CINÉTICA EN DOS DIMENSIONES (Movimiento alrededor del Canvas)
                vec2 gridPos = floor(uv * uCols);
                
                // Darle una dirección y velocidad única 2D a cada bloque basándonos en la semilla
                float angle = hash2d(gridPos) * 6.2831; 
                vec2 moveDirection = vec2(cos(angle), sin(angle));
                
                float blockSpeed = (0.3 + hash2d(gridPos + 4.5)) * uSpeed * 0.12;
                vec2 totalShift = moveDirection * uTime * blockSpeed;
                
                vec2 distortedUv = uv;
                
                // Romper y desplazar cinéticamente bloques aleatorios distribuidos en 2D
                if (hash2d(gridPos * 13.8) > 0.3) {
                    distortedUv = fract(uv + totalShift);
                }

                // Tomar muestra de color de la imagen sin deformaciones
                vec4 texColor = texture2D(uTexture, distortedUv);
                
                // Mapeos cromáticos seleccionables
                if (uColorMode == 0) {
                    // Modo Original
                    gl_FragColor = texColor;
                } else {
                    // Obtener Luminancia
                    float grayscale = dot(texColor.rgb, vec3(0.2126, 0.7152, 0.0722));
                    vec3 finalColor;
                    
                    if (uColorMode == 1) {
                        // Duotono
                        finalColor = mix(uColorShadow, uColorLight, grayscale);
                    } else {
                        // Tritono
                        if (grayscale < 0.5) {
                            finalColor = mix(uColorShadow, uColorMid, grayscale * 2.0);
                        } else {
                            finalColor = mix(uColorMid, uColorLight, (grayscale - 0.5) * 2.0);
                        }
                    }
                    
                    // Añadir formas / bloques planos ciegos estéticos de la imagen de referencia
                    if (hash2d(floor(distortedUv * uCols * 0.7)) > 0.84) {
                        finalColor = (uColorMode == 2) ? uColorMid : uColorShadow;
                    }
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            }
        `;

        let scene, camera, renderer, material, mesh, currentTexture;
        const canvas = document.getElementById('webgl-canvas');
        const container = document.getElementById('canvas-container');
        
        const uniforms = {
            uTexture: { value: null },
            uResolution: { value: new THREE.Vector2(1, 1) },
            uImageResolution: { value: new THREE.Vector2(1, 1) },
            uTime: { value: 0 },
            uCols: { value: 8.0 },
            uSpeed: { value: 1.0 },
            uSeed: { value: 1.0 },
            uColorMode: { value: 0 }, // 0=Original, 1=Duo, 2=Tri
            uColorShadow: { value: new THREE.Color('#1c1626') },
            uColorMid: { value: new THREE.Color('#bebeeb') },
            uColorLight: { value: new THREE.Color('#ffffff') }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const w = container.clientWidth || window.innerWidth;
            const h = container.clientHeight || window.innerHeight;
            renderer.setSize(w, h);
            uniforms.uResolution.value.set(w, h);

            material = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms,
                depthWrite: false,
                depthTest: false
            });

            mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            createPlaceholder();
            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            uniforms.uTime.value = timestamp * 0.001;
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
            uniforms.uResolution.value.set(w, h);
        }

        // Carga de archivos y actualización de dimensiones reales de la imagen
        document.getElementById('image-loader').addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    if (currentTexture) currentTexture.dispose();
                    
                    currentTexture = new THREE.Texture(img);
                    currentTexture.minFilter = THREE.LinearFilter;
                    currentTexture.needsUpdate = true;
                    
                    uniforms.uTexture.value = currentTexture;
                    uniforms.uImageResolution.value.set(img.width, img.height);
                    onWindowResize();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // Controles de Estructura Cinética
        document.getElementById('param-cols').addEventListener('input', (e) => {
            uniforms.uCols.value = parseFloat(e.target.value);
            document.getElementById('cols-val').innerText = e.target.value;
        });
        document.getElementById('param-speed').addEventListener('input', (e) => {
            uniforms.uSpeed.value = parseFloat(e.target.value);
            document.getElementById('speed-val').innerText = e.target.value;
        });
        document.getElementById('btn-regenerate').addEventListener('click', () => {
            uniforms.uSeed.value = Math.random() * 100.0;
        });

        // Controladores del Modo de Filtro Cromático
        function updateColorModeButtons(activeId, modeValue) {
            uniforms.uColorMode.value = modeValue;
            ['mode-none', 'mode-duo', 'mode-tri'].forEach(id => {
                document.getElementById(id).className = id === activeId 
                    ? "bg-purple-600 p-1.5 rounded cursor-pointer transition-all"
                    : "bg-white/5 p-1.5 rounded hover:bg-white/10 cursor-pointer transition-all";
            });
            
            const panel = document.getElementById('panel-colors');
            const midWrapper = document.getElementById('wrapper-mid-color');
            
            if (modeValue === 0) {
                panel.classList.add('opacity-40', 'pointer-events-none');
            } else {
                panel.classList.remove('opacity-40', 'pointer-events-none');
                if (modeValue === 1) {
                    midWrapper.classList.add('opacity-20', 'pointer-events-none');
                } else {
                    midWrapper.classList.remove('opacity-20', 'pointer-events-none');
                }
            }
        }

        document.getElementById('mode-none').addEventListener('click', () => updateColorModeButtons('mode-none', 0));
        document.getElementById('mode-duo').addEventListener('click', () => updateColorModeButtons('mode-duo', 1));
        document.getElementById('mode-tri').addEventListener('click', () => updateColorModeButtons('mode-tri', 2));

        // Hex Colors Pickers
        document.getElementById('color-shadow').addEventListener('input', (e) => uniforms.uColorShadow.value.set(e.target.value));
        document.getElementById('color-mid').addEventListener('input', (e) => uniforms.uColorMid.value.set(e.target.value));
        document.getElementById('color-light').addEventListener('input', (e) => uniforms.uColorLight.value.set(e.target.value));

        // Ajustes de Relación de Aspecto en Pantalla
        function setRatioLayout(wFactor, hFactor, activeId) {
            ['ratio-full', 'ratio-169', 'ratio-45'].forEach(id => {
                document.getElementById(id).className = id === activeId 
                    ? "bg-purple-600 p-2 rounded-lg border border-purple-400/30 cursor-pointer transition-all"
                    : "bg-white/5 p-2 rounded-lg border border-white/5 hover:bg-white/10 cursor-pointer transition-all";
            });

            if(wFactor === 0) {
                container.style.width = "100%";
                container.style.height = "100%";
            } else {
                const maxH = window.innerHeight * 0.82;
                const computedW = maxH * (wFactor / hFactor);
                if(computedW > window.innerWidth * 0.82) {
                    container.style.width = '82vw';
                    container.style.height = (window.innerWidth * 0.82) * (hFactor / wFactor) + 'px';
                } else {
                    container.style.width = computedW + 'px';
                    container.style.height = maxH + 'px';
                }
            }
            setTimeout(onWindowResize, 40);
        }

        document.getElementById('ratio-full').addEventListener('click', () => setRatioLayout(0, 0, 'ratio-full'));
        document.getElementById('ratio-169').addEventListener('click', () => setRatioLayout(16, 9, 'ratio-169'));
        document.getElementById('ratio-45').addEventListener('click', () => setRatioLayout(4, 5, 'ratio-45'));

        // Guardado Limpio PNG
        document.getElementById('btn-snap').addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `kinetic-modulator-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });

        // Grabación Cinética WebM
        let isRecording = false;
        document.getElementById('btn-record').addEventListener('click', async () => {
            if (isRecording) return;
            isRecording = true;
            
            const textEl = document.getElementById('record-text');
            const dotEl = document.getElementById('record-dot');
            textEl.innerText = "GRAVANDO VIDEO...";
            dotEl.classList.remove('hidden');

            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kinetic-modulator-${Date.now()}.webm`;
                a.click();
                
                textEl.innerText = "Grabar WebM (5s)";
                dotEl.classList.add('hidden');
                isRecording = false;
            };

            recorder.start();
            setTimeout(() => { recorder.stop(); }, 5000);
        });

        function createPlaceholder() {
            const size = 1024;
            const canvasP = document.createElement('canvas');
            canvasP.width = size; canvasP.height = size;
            const ctx = canvasP.getContext('2d');
            
            let grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#121214'); grad.addColorStop(1, '#2c253b');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 44px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("[ CARGA TU IMAGEN AQUÍ ]", size/2, size/2 - 20);
            ctx.font = '26px monospace';
            ctx.fillStyle = '#a8a8b3';
            ctx.fillText("MODULATOR LAB _v2 MULTIDIRECCIONAL", size/2, size/2 + 40);
            
            currentTexture = new THREE.CanvasTexture(canvasP);
            uniforms.uTexture.value = currentTexture;
            uniforms.uImageResolution.value.set(size, size);
        }

        window.onload = init;
    </script>
</body>
</html>
